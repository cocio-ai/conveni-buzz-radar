<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セブンイレブン YouTube バズモニター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e8001a;
  --yt: #ff0000;
  --yt-dark: #cc0000;
  --bg: #f5f5f5;
  --white: #ffffff;
  --border: #e8e8e8;
  --text: #1a1a1a;
  --sub: #888;
  --shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
header { background: #0f0f0f; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 12px; }
.yt-icon { background: var(--yt); color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
.logo-texts { display: flex; flex-direction: column; }
.logo-main { font-weight: 700; font-size: 15px; color: white; line-height: 1.2; }
.logo-main span { color: var(--yt); }
.logo-sub { font-size: 10px; color: #aaa; letter-spacing: .5px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.live-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; }
.live-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.5);}70%{box-shadow:0 0 0 6px rgba(34,197,94,0);}100%{box-shadow:0 0 0 0 rgba(34,197,94,0);} }
.refresh-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #333; background: transparent; font-family: inherit; font-size: 12px; font-weight: 500; color: #ccc; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
.refresh-btn:hover { border-color: var(--yt); color: var(--yt); }
.refresh-btn.spin .ri { display:inline-block; animation: spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg);} }
main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
.loading-bar { background: var(--yt); color: white; text-align: center; padding: 8px; font-size: 13px; font-weight: 500; display: none; }
.loading-bar.show { display: block; }
.error-bar { background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 14px; display: none; }
.error-bar.show { display: block; }
.source-banner { display: flex; align-items: center; gap: 10px; background: #fff8f8; border: 1px solid #ffdddd; border-radius: 10px; padding: 10px 16px; margin-bottom: 16px; font-size: 12px; color: var(--sub); }
.source-banner .yt-logo { background: var(--yt); color: white; font-weight: 700; font-size: 11px; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
.source-banner strong { color: var(--text); }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--white); border-radius: 10px; padding: 16px 18px; box-shadow: var(--shadow); border-top: 3px solid var(--yt); }
.stat-label { font-size: 11px; color: var(--sub); font-weight: 500; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--sub); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
.search-wrap input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 32px; font-family: inherit; font-size: 13px; background: var(--white); outline: none; transition: border-color .15s; }
.search-wrap input:focus { border-color: var(--yt); }
.search-wrap input::placeholder { color: #bbb; }
.search-wrap .si { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#bbb;font-size:14px; }
.sort-group { display: flex; gap: 4px; margin-left: auto; }
.stab { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; font-family: inherit; border: 1px solid var(--border); background: var(--white); color: var(--sub); cursor: pointer; transition: all .15s; }
.stab.on { background: var(--yt); color: white; border-color: var(--yt); }
.two-col { display: grid; grid-template-columns: 1fr 260px; gap: 16px; }
.feed-title { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.yt-badge { background: var(--yt); color: white; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; }
.feed-count { font-weight: 400; margin-left: auto; }
#feedList { display: flex; flex-direction: column; gap: 10px; }
.vcard { background: var(--white); border-radius: 10px; padding: 14px; box-shadow: var(--shadow); border: 1px solid var(--border); cursor: pointer; transition: box-shadow .15s, border-color .15s; animation: fadeUp .3s ease both; }
.vcard:hover { box-shadow: 0 4px 16px rgba(0,0,0,.10); border-color: #ffbbbb; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);} }
.vcard-top { display: flex; gap: 12px; }
.vcard-thumb { width: 120px; height: 68px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #111; }
.vcard-thumb-placeholder { width: 120px; height: 68px; border-radius: 6px; background: #111; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 28px; }
.vcard-info { flex: 1; min-width: 0; }
.vcard-channel { font-size: 12px; color: var(--sub); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
.vcard-channel .yt-dot { width: 6px; height: 6px; background: var(--yt); border-radius: 50%; }
.vcard-title { font-size: 13px; font-weight: 700; line-height: 1.5; color: var(--text); margin-bottom: 6px; }
.vcard-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
.vtag { padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.vtag-new    { background: #fff0f2; color: var(--red);  border: 1px solid #ffd0d6; }
.vtag-collab { background: #fff8e8; color: #cc6600; border: 1px solid #fde5b8; }
.vtag-food   { background: #e8f7ee; color: #007b40; border: 1px solid #b8e8ca; }
.vtag-yt     { background: #fff0f0; color: var(--yt-dark); border: 1px solid #ffcccc; }
.vcard-time { font-size: 11px; color: #bbb; }
.hot-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--yt); color: white; margin-left: 4px; }
.vcard-metrics { display: flex; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 10px; }
.vm { display: flex; align-items: center; gap: 4px; padding-right: 14px; margin-right: 14px; border-right: 1px solid var(--border); font-size: 12px; color: var(--sub); }
.vm:last-child { border-right: none; padding-right: 0; margin-right: 0; }
.vm strong { font-weight: 700; color: var(--text); font-size: 14px; }
.vm.views strong { color: var(--yt-dark); font-size: 16px; }
.vm-spacer { flex: 1; }
.load-more-wrap { text-align:center; margin-top: 12px; }
.load-more-btn { padding: 8px 24px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); font-family: inherit; font-size: 12px; color: var(--sub); cursor: pointer; transition: all .15s; }
.load-more-btn:hover { border-color: var(--yt); color: var(--yt); }
.empty { text-align: center; padding: 48px 24px; color: var(--sub); border: 1px dashed var(--border); border-radius: 10px; background: var(--white); }
.empty .big { font-size: 40px; display: block; margin-bottom: 10px; }
.sidebar { display: flex; flex-direction: column; gap: 12px; }
.scard { background: var(--white); border-radius: 10px; padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border); }
.scard-title { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.rank-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer; align-items: flex-start; }
.rank-item:last-child { border-bottom: none; }
.rank-item:hover .ri-title { color: var(--yt); }
.ri-num { font-size: 18px; font-weight: 700; color: #ddd; width: 24px; flex-shrink: 0; }
.ri-num.top { color: var(--yt); }
.ri-title { font-size: 12px; font-weight: 600; margin-bottom: 2px; line-height: 1.4; transition: color .12s; }
.ri-views { font-size: 11px; color: var(--sub); }
.ri-views strong { color: var(--yt-dark); }
.kw-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.kw-item:last-child { border-bottom: none; }
.kw-item:hover .kw-word { color: var(--yt); }
.kw-rank { font-size: 15px; font-weight: 700; width: 20px; text-align: center; color: #ccc; flex-shrink: 0; }
.kw-rank.top { color: var(--yt); }
.kw-body { flex: 1; min-width: 0; }
.kw-word { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color .12s; }
.kw-cnt { font-size: 10px; color: var(--sub); }
.kw-bar { width: 40px; height: 3px; background: #eee; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
.kw-fill { height: 100%; border-radius: 2px; background: var(--yt); }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.on { display: flex; }
.modal-box { background: var(--white); border-radius: 14px; padding: 24px; max-width: 520px; width: 92%; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.25); animation: pop .2s ease; }
@keyframes pop { from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);} }
.modal-close { position: absolute; top:12px; right:12px; width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background: transparent; cursor:pointer; font-size:14px; color:var(--sub); display:flex; align-items:center; justify-content:center; }
.yt-open-btn { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 10px 18px; background: var(--yt); color: white; border-radius: 8px; font-size: 13px; font-weight: 700; text-decoration: none; }
.yt-open-btn:hover { opacity: .85; }
@media(max-width:900px) { .two-col{grid-template-columns:1fr;} .sidebar{display:grid;grid-template-columns:repeat(2,1fr);} }
@media(max-width:580px) { .stats-row{grid-template-columns:repeat(2,1fr);} .sidebar{grid-template-columns:1fr;} .vcard-thumb,.vcard-thumb-placeholder{width:90px;height:52px;} }
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#f0f0f0;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar">▶ YouTubeからセブンイレブン関連動画を取得中...</div>

<header>
  <div class="logo">
    <div class="yt-icon">▶</div>
    <div class="logo-texts">
      <div class="logo-main"><span>YouTube</span> × 7-Eleven バズモニター</div>
      <div class="logo-sub">セブンイレブン関連動画をリアルタイム監視</div>
    </div>
  </div>
  <div class="header-right">
    <div class="live-wrap">
      <div class="live-dot"></div>
      <span id="updateTime">読み込み中…</span>
    </div>
    <button class="refresh-btn" onclick="doRefresh()"><span class="ri">↻</span> 更新</button>
  </div>
</header>

<main>
  <div class="error-bar" id="errorBar"></div>
  <div class="source-banner">
    <span class="yt-logo">▶ YouTube</span>
    <div><strong>データソース：YouTube Data API v3</strong>　「セブンイレブン 新商品・スイーツ・コラボ・食べてみた」の最新動画をリアルタイム取得・5分ごと自動更新</div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-label">▶ 取得動画数</div><div class="stat-value" id="st-total">—</div><div class="stat-sub">YouTubeリアルタイム</div></div>
    <div class="stat-card"><div class="stat-label">👁 最多再生数</div><div class="stat-value" id="st-views">—</div><div class="stat-sub" id="st-views-sub">トップ動画</div></div>
    <div class="stat-card"><div class="stat-label">👍 最多いいね</div><div class="stat-value" id="st-likes">—</div><div class="stat-sub" id="st-likes-sub">トップ動画</div></div>
    <div class="stat-card"><div class="stat-label">🔥 急上昇ワード</div><div class="stat-value" id="st-word" style="font-size:16px;padding-top:4px">—</div><div class="stat-sub" id="st-word-sub">動画タイトルより</div></div>
  </div>
  <div class="filters">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="searchInput" placeholder="動画タイトル・チャンネルで絞り込み…" oninput="renderFeed()">
    </div>
    <div class="sort-group">
      <button class="stab" onclick="setSort('new',this)">新着順</button>
      <button class="stab on" onclick="setSort('views',this)">再生数順</button>
      <button class="stab" onclick="setSort('likes',this)">いいね順</button>
    </div>
  </div>
  <div class="two-col">
    <div>
      <div class="feed-title">
        <span class="yt-badge">▶ YouTube</span>
        動画フィード
        <span class="feed-count" id="feedCount"></span>
      </div>
      <div id="feedList"></div>
      <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
        <button class="load-more-btn" onclick="loadMore()">もっと見る</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="scard"><div class="scard-title"><span style="color:var(--yt)">▶</span> 再生数ランキング</div><div id="rankList"></div></div>
      <div class="scard"><div class="scard-title">🔥 急上昇キーワード</div><div id="kwList"></div></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API_KEY='AIzaSyAh8EUg3nb61QZbwjZvrzLwvG4AA1Q_ENM';
const KEYWORDS='セブンイレブン 新商品 OR セブンイレブン スイーツ OR セブンイレブン コラボ OR セブンイレブン 食べてみた';
const MAX_RESULTS=30;
let POSTS=[],activeSort='views',showN=10,refreshing=false;

function fmtN(n){if(!n)return'0';if(n>=10000)return(n/10000).toFixed(1)+'万';if(n>=1000)return(n/1000).toFixed(1)+'k';return''+n;}
function timeAgo(iso){const d=(Date.now()-new Date(iso))/1000;if(d<60)return'今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';if(d<86400*30)return Math.floor(d/86400)+'日前';return Math.floor(d/86400/30)+'ヶ月前';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function fetchYouTube(){
  document.getElementById('loadingBar').classList.add('show');
  document.getElementById('errorBar').classList.remove('show');
  try{
    const sr=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(KEYWORDS)}&type=video&order=date&maxResults=${MAX_RESULTS}&regionCode=JP&relevanceLanguage=ja&key=${API_KEY}`);
    const sd=await sr.json();
    if(sd.error) throw new Error(sd.error.message);
    const items=sd.items||[];
    if(!items.length) throw new Error('動画が見つかりませんでした');
    const ids=items.map(i=>i.id.videoId).join(',');
    const vr=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${API_KEY}`);
    const vd=await vr.json();
    const sm={};
    (vd.items||[]).forEach(v=>{sm[v.id]=v.statistics;});
    POSTS=items.map(item=>{
      const vid=item.id.videoId,snip=item.snippet,stats=sm[vid]||{};
      return{id:vid,title:snip.title,channel:snip.channelTitle,time:snip.publishedAt,thumb:snip.thumbnails?.medium?.url||'',views:parseInt(stats.viewCount||0),likes:parseInt(stats.likeCount||0),comments:parseInt(stats.commentCount||0),url:`https://www.youtube.com/watch?v=${vid}`,tags:autoTag(snip.title)};
    });
    renderFeed();renderSidebar();
    document.getElementById('updateTime').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' 更新';
  }catch(e){
    const eb=document.getElementById('errorBar');
    eb.textContent='⚠️ 取得エラー: '+e.message;
    eb.classList.add('show');
  }finally{
    document.getElementById('loadingBar').classList.remove('show');
  }
}

function autoTag(t){
  const tags=[];
  if(/新商品|新発売|新作/.test(t)) tags.push({l:'新商品',c:'vtag-new'});
  if(/コラボ|限定|期間限定/.test(t)) tags.push({l:'コラボ',c:'vtag-collab'});
  if(/スイーツ|プリン|ケーキ|パフェ|アイス|チョコ|苺|大福/.test(t)) tags.push({l:'スイーツ',c:'vtag-food'});
  if(/弁当|おにぎり|サンド|麺|飯|肉まん|から揚げ/.test(t)) tags.push({l:'フード',c:'vtag-food'});
  tags.push({l:'YouTube',c:'vtag-yt'});
  return tags;
}

function getFiltered(){
  const kw=document.getElementById('searchInput').value.toLowerCase();
  let posts=[...POSTS];
  if(kw) posts=posts.filter(p=>p.title.toLowerCase().includes(kw)||p.channel.toLowerCase().includes(kw));
  if(activeSort==='views') posts.sort((a,b)=>b.views-a.views);
  else if(activeSort==='likes') posts.sort((a,b)=>b.likes-a.likes);
  else posts.sort((a,b)=>new Date(b.time)-new Date(a.time));
  return posts;
}

function renderFeed(){
  const posts=getFiltered();
  document.getElementById('feedCount').textContent=`(${posts.length}件)`;
  const el=document.getElementById('feedList');
  if(!posts.length){el.innerHTML='<div class="empty"><span class="big">▶</span>データを取得中、または該当動画がありません</div>';document.getElementById('loadMoreWrap').style.display='none';return;}
  el.innerHTML=posts.slice(0,showN).map((p,i)=>{
    const tags=p.tags.map(t=>`<span class="vtag ${t.c}">${t.l}</span>`).join('');
    const hot=p.views>=100000?'<span class="hot-badge">🔥 HOT</span>':'';
    const thumb=p.thumb?`<img class="vcard-thumb" src="${esc(p.thumb)}" alt="" loading="lazy">`:`<div class="vcard-thumb-placeholder">▶</div>`;
    return`<div class="vcard" style="animation-delay:${i*.03}s" onclick="openModal('${p.id}')">
      <div class="vcard-top">${thumb}<div class="vcard-info">
        <div class="vcard-channel"><span class="yt-dot"></span>${esc(p.channel)}${hot}</div>
        <div class="vcard-title">${esc(p.title)}</div>
        ${tags?`<div class="vcard-tags">${tags}</div>`:''}
        <div class="vcard-time">${timeAgo(p.time)}</div>
      </div></div>
      <div class="vcard-metrics">
        <div class="vm views">👁 <strong>${fmtN(p.views)}</strong></div>
        <div class="vm">👍 <strong>${fmtN(p.likes)}</strong></div>
        <div class="vm">💬 <strong>${fmtN(p.comments)}</strong></div>
        <div class="vm-spacer"></div>
        <div style="font-size:11px;color:#bbb">▶ YouTube</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreWrap').style.display=posts.length>showN?'block':'none';
}

function loadMore(){showN+=10;renderFeed();}

function renderSidebar(){
  if(!POSTS.length)return;
  const top=[...POSTS].sort((a,b)=>b.views-a.views);
  const topV=top[0],topL=[...POSTS].sort((a,b)=>b.likes-a.likes)[0];
  document.getElementById('st-total').textContent=POSTS.length;
  document.getElementById('st-views').textContent=fmtN(topV.views);
  document.getElementById('st-views-sub').textContent=topV.title.slice(0,14)+'…';
  document.getElementById('st-likes').textContent=fmtN(topL.likes);
  document.getElementById('st-likes-sub').textContent=topL.title.slice(0,14)+'…';
  document.getElementById('rankList').innerHTML=top.slice(0,5).map((v,i)=>`
    <div class="rank-item" onclick="openModal('${v.id}')">
      <div class="ri-num ${i<3?'top':''}">${i+1}</div>
      <div><div class="ri-title">${esc(v.title.slice(0,30))}…</div><div class="ri-views">👁 <strong>${fmtN(v.views)}</strong> 再生　👍 ${fmtN(v.likes)}</div></div>
    </div>`).join('');
  const wmap={};
  const stop=new Set(['の','は','が','を','に','で','と','も','や','から','する','した','して','いる','ある','こと','その','この','な','ない','れ','て','セブン','セブンイレブン','コンビニ','ます','です','してみた','食べてみた','やってみた']);
  POSTS.forEach(p=>{(p.title.match(/[ぁ-ん]{2,}|[ァ-ン]{3,}|[一-龠]{2,}/g)||[]).forEach(w=>{if(!stop.has(w)&&w.length>1)wmap[w]=(wmap[w]||0)+1;});});
  const kws=Object.entries(wmap).sort((a,b)=>b[1]-a[1]).slice(0,7);
  document.getElementById('st-word').textContent=kws[0]?.[0]||'—';
  document.getElementById('st-word-sub').textContent=kws[0]?`${kws[0][1]}本の動画`:'動画タイトルより';
  const maxK=kws[0]?.[1]||1;
  document.getElementById('kwList').innerHTML=kws.map(([w,c],i)=>`
    <div class="kw-item" onclick="document.getElementById('searchInput').value='${w}';renderFeed()">
      <div class="kw-rank ${i<3?'top':''}">${i+1}</div>
      <div class="kw-body"><div class="kw-word">${esc(w)}</div><div class="kw-cnt">${c}本</div></div>
      <div class="kw-bar"><div class="kw-fill" style="width:${c/maxK*100}%"></div></div>
    </div>`).join('');
}

function openModal(id){
  const p=POSTS.find(x=>x.id===id);if(!p)return;
  const tags=p.tags.map(t=>`<span class="vtag ${t.c}">${t.l}</span>`).join('');
  document.getElementById('modalBody').innerHTML=`
    ${p.thumb?`<img src="${esc(p.thumb)}" style="width:100%;border-radius:8px;margin-bottom:14px">`:''}
    <div style="font-weight:700;font-size:15px;line-height:1.5;margin-bottom:6px">${esc(p.title)}</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="color:var(--yt)">▶</span>${esc(p.channel)} · ${timeAgo(p.time)}</div>
    ${tags?`<div class="vcard-tags" style="margin-bottom:12px">${tags}</div>`:''}
    <div style="display:flex;gap:20px;flex-wrap:wrap">
      <div class="vm" style="font-size:13px">👁 <strong style="font-size:18px;color:var(--yt-dark)">${fmtN(p.views)}</strong> 再生</div>
      <div class="vm" style="font-size:13px">👍 <strong>${fmtN(p.likes)}</strong> いいね</div>
      <div class="vm" style="font-size:13px">💬 <strong>${fmtN(p.comments)}</strong> コメント</div>
    </div>
    <a class="yt-open-btn" href="${esc(p.url)}" target="_blank">▶ YouTubeで見る</a>`;
  document.getElementById('modalOverlay').classList.add('on');
}

function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('on');}
function setSort(s,btn){activeSort=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderFeed();}

function doRefresh(){
  if(refreshing)return;refreshing=true;showN=10;
  const btn=document.querySelector('.refresh-btn');
  btn.classList.add('spin');btn.disabled=true;
  fetchYouTube().finally(()=>{btn.classList.remove('spin');btn.disabled=false;refreshing=false;});
}

document.addEventListener('DOMContentLoaded',()=>{
  fetchYouTube();
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  setInterval(doRefresh,5*60*1000);
});
</script>
</body>
</html>
