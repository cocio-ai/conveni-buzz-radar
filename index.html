<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セブンイレブン バズモニター</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #e8001a;
  --orange: #ff6600;
  --green: #007b40;
  --bg: #f5f5f5;
  --white: #ffffff;
  --border: #e8e8e8;
  --text: #1a1a1a;
  --sub: #888;
  --card-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
header { background: var(--white); border-bottom: 3px solid var(--red); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 8px rgba(0,0,0,0.06); }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-badge { background: var(--red); color: white; font-weight: 700; font-size: 13px; padding: 4px 8px; border-radius: 4px; }
.logo-text { font-weight: 700; font-size: 16px; color: var(--text); }
.logo-text span { color: var(--red); }
.header-right { display: flex; align-items: center; gap: 12px; }
.live-dot-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--sub); }
.live-dot { width: 7px; height: 7px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,.5); } 70% { box-shadow: 0 0 0 6px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
.refresh-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--white); font-family: inherit; font-size: 12px; font-weight: 500; color: var(--text); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
.refresh-btn:hover { border-color: var(--red); color: var(--red); }
.refresh-btn.spin .ri { display:inline-block; animation: spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
main { max-width: 1100px; margin: 0 auto; padding: 20px 16px 40px; }
.loading-bar { background: var(--red); color: white; text-align: center; padding: 8px; font-size: 13px; font-weight: 500; display: none; }
.loading-bar.show { display: block; }
.error-bar { background: #fff3cd; color: #856404; border: 1px solid #ffc107; border-radius: 8px; padding: 10px 14px; font-size: 12px; margin-bottom: 14px; display: none; }
.error-bar.show { display: block; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-card { background: var(--white); border-radius: 10px; padding: 16px 18px; box-shadow: var(--card-shadow); border-top: 3px solid transparent; }
.stat-card.red { border-top-color: var(--red); }
.stat-card.orange { border-top-color: var(--orange); }
.stat-card.green { border-top-color: var(--green); }
.stat-card.gray { border-top-color: #aaa; }
.stat-label { font-size: 11px; color: var(--sub); font-weight: 500; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--sub); margin-top: 4px; }
.filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 300px; }
.search-wrap input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 32px; font-family: inherit; font-size: 13px; background: var(--white); outline: none; transition: border-color .15s; }
.search-wrap input:focus { border-color: var(--red); }
.search-wrap input::placeholder { color: #bbb; }
.search-wrap .si { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:#bbb; font-size:14px; }
.sort-group { display: flex; gap: 4px; margin-left: auto; }
.stab { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; font-family: inherit; border: 1px solid var(--border); background: var(--white); color: var(--sub); cursor: pointer; transition: all .15s; }
.stab.on { background: var(--text); color: white; border-color: var(--text); }
.two-col { display: grid; grid-template-columns: 1fr 260px; gap: 16px; }
.feed-title { font-size: 13px; font-weight: 700; color: var(--sub); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.feed-source { font-size: 11px; background: #e8f4fd; color: #1d9bf0; padding: 2px 7px; border-radius: 4px; font-weight: 500; }
.feed-count { font-weight: 400; }
#feedList { display: flex; flex-direction: column; gap: 8px; }
.pcard { background: var(--white); border-radius: 10px; padding: 16px; box-shadow: var(--card-shadow); border: 1px solid var(--border); cursor: pointer; transition: box-shadow .15s, border-color .15s; animation: fadeUp .3s ease both; }
.pcard:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.10); border-color: #d0d0d0; }
@keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.pcard-top { display: flex; align-items: flex-start; gap: 12px; }
.pcard-thumb { width: 80px; height: 56px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: #eee; }
.platform-icon { width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.pi-youtube { background: #fde8e8; color: #ff0000; }
.pcard-info { flex: 1; min-width: 0; }
.pcard-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.pcard-author { font-weight: 700; font-size: 13px; }
.pcard-time { font-size: 11px; color: #bbb; margin-left: auto; }
.pcard-tags { display: flex; gap: 4px; margin-bottom: 7px; flex-wrap: wrap; }
.ptag { padding: 2px 7px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.ptag-new { background: #fff0f2; color: var(--red); border: 1px solid #ffd0d6; }
.ptag-collab { background: #fff8e8; color: var(--orange); border: 1px solid #fde5b8; }
.ptag-food { background: #e8f7ee; color: var(--green); border: 1px solid #b8e8ca; }
.ptag-yt { background: #fde8e8; color: #cc0000; border: 1px solid #ffb0b0; }
.pcard-text { font-size: 13px; line-height: 1.75; color: #333; margin-bottom: 10px; word-break: break-all; }
.pcard-metrics { display: flex; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 2px; flex-wrap: wrap; gap: 4px; }
.metric { display: flex; align-items: center; gap: 4px; padding-right: 16px; margin-right: 16px; border-right: 1px solid var(--border); font-size: 12px; color: var(--sub); }
.metric:last-child { border-right: none; margin-right: 0; padding-right: 0; }
.metric strong { font-size: 14px; font-weight: 700; color: var(--text); }
.pcard-buzz { margin-left: auto; display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
.buzz-num { font-size: 22px; font-weight: 700; color: var(--red); line-height: 1; }
.buzz-label { font-size: 10px; color: var(--sub); margin-top: 2px; }
.hot-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--red); color: white; margin-left: 6px; }
.load-more-wrap { text-align:center; margin-top: 12px; }
.load-more-btn { padding: 8px 24px; border-radius: 8px; border: 1px solid var(--border); background: var(--white); font-family: inherit; font-size: 12px; color: var(--sub); cursor: pointer; transition: all .15s; }
.load-more-btn:hover { border-color: var(--red); color: var(--red); }
.empty { text-align: center; padding: 48px 24px; color: var(--sub); border: 1px dashed var(--border); border-radius: 10px; background: var(--white); }
.empty .big { font-size: 36px; display: block; margin-bottom: 10px; }
.sidebar { display: flex; flex-direction: column; gap: 12px; }
.scard { background: var(--white); border-radius: 10px; padding: 16px; box-shadow: var(--card-shadow); border: 1px solid var(--border); }
.scard-title { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.trend-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all .12s; }
.trend-item:last-child { border-bottom: none; }
.trend-item:hover .ti-word { color: var(--red); }
.ti-rank { font-size: 16px; font-weight: 700; width: 22px; text-align: center; color: #ccc; flex-shrink: 0; }
.ti-rank.top3 { color: var(--red); }
.ti-body { flex: 1; min-width: 0; }
.ti-word { font-size: 13px; font-weight: 600; transition: color .12s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ti-cnt { font-size: 10px; color: var(--sub); margin-top: 1px; }
.ti-bar { width: 44px; height: 3px; background: #eee; border-radius: 2px; overflow: hidden; flex-shrink:0; }
.ti-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--red), var(--orange)); }
.pb-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); }
.pb-item:last-child { border-bottom:none; }
.pb-name { font-size:12px; font-weight:600; width:72px; }
.pb-bar { flex:1; height:4px; background:#eee; border-radius:2px; overflow:hidden; }
.pb-fill { height:100%; border-radius:2px; transition:width .4s ease; }
.pb-cnt { font-size:11px; color:var(--sub); width:24px; text-align:right; }
.prod-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: flex-start; cursor: pointer; }
.prod-item:last-child { border-bottom:none; }
.prod-rank { font-size: 18px; font-weight: 700; color: #ddd; width: 24px; flex-shrink: 0; line-height: 1.2; }
.prod-rank.top { color: var(--red); }
.prod-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; line-height: 1.4; }
.prod-views { font-size: 11px; color: var(--sub); }
.prod-views strong { color: #cc0000; font-size: 13px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.on { display: flex; }
.modal-box { background: var(--white); border-radius: 14px; padding: 28px; max-width: 520px; width: 92%; max-height: 85vh; overflow-y: auto; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,.2); animation: pop .2s ease; }
@keyframes pop { from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);} }
.modal-close { position: absolute; top:14px; right:14px; width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background: transparent; cursor:pointer; font-size:14px; color:var(--sub); display:flex; align-items:center; justify-content:center; }
.yt-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 8px 16px; background: #ff0000; color: white; border-radius: 6px; font-size: 13px; font-weight: 700; text-decoration: none; }
@media(max-width:900px) { .two-col { grid-template-columns:1fr; } .sidebar { display: grid; grid-template-columns: repeat(2,1fr); } }
@media(max-width:580px) { .stats-row { grid-template-columns: repeat(2,1fr); } .sidebar { grid-template-columns: 1fr; } }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#f0f0f0; }
::-webkit-scrollbar-thumb { background:#ddd; border-radius:2px; }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar">📡 YouTubeからデータを取得中...</div>

<header>
  <div class="logo">
    <div class="logo-badge">7-Eleven</div>
    <div class="logo-text">バズ<span>モニター</span></div>
  </div>
  <div class="header-right">
    <div class="live-dot-wrap">
      <div class="live-dot"></div>
      <span id="updateTime">読み込み中…</span>
    </div>
    <button class="refresh-btn" onclick="doRefresh()"><span class="ri">↻</span> 更新</button>
  </div>
</header>

<main>
  <div class="error-bar" id="errorBar"></div>
  <div class="stats-row">
    <div class="stat-card red"><div class="stat-label">総動画数</div><div class="stat-value" id="st-total">0</div><div class="stat-sub" id="st-sub">YouTube取得</div></div>
    <div class="stat-card orange"><div class="stat-label">🔥 最多再生</div><div class="stat-value" id="st-views">0</div><div class="stat-sub" id="st-views-sub">トップ動画</div></div>
    <div class="stat-card green"><div class="stat-label">👍 最多いいね</div><div class="stat-value" id="st-likes">0</div><div class="stat-sub" id="st-likes-sub">トップ動画</div></div>
    <div class="stat-card gray"><div class="stat-label">急上昇ワード</div><div class="stat-value" id="st-word" style="font-size:15px;padding-top:5px">—</div><div class="stat-sub" id="st-word-sub">トレンド</div></div>
  </div>
  <div class="filters">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="searchInput" placeholder="キーワードで絞り込み…" oninput="renderFeed()">
    </div>
    <div class="sort-group">
      <button class="stab" onclick="setSort('new',this)">新着順</button>
      <button class="stab on" onclick="setSort('views',this)">再生数順</button>
      <button class="stab" onclick="setSort('likes',this)">いいね順</button>
    </div>
  </div>
  <div class="two-col">
    <div>
      <div class="feed-title">
        YouTube動画一覧
        <span class="feed-source">▶ YouTube リアルタイム</span>
        <span class="feed-count" id="feedCount"></span>
      </div>
      <div id="feedList"></div>
      <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
        <button class="load-more-btn" onclick="loadMore()">もっと見る</button>
      </div>
    </div>
    <div class="sidebar">
      <div class="scard"><div class="scard-title">🎬 人気動画ランキング</div><div id="prodList"></div></div>
      <div class="scard"><div class="scard-title">📈 急上昇キーワード</div><div id="trendList"></div></div>
      <div class="scard"><div class="scard-title">📊 データソース</div><div id="pbList"></div></div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const API_KEY = 'AIzaSyAh8EUg3nb61QZbwjZvrzLwvG4AA1Q_ENM';
const KEYWORDS = 'セブンイレブン 新商品 OR セブンイレブン スイーツ OR セブンイレブン コラボ OR セブンイレブン 食べてみた';
const MAX_RESULTS = 30;

let POSTS = [];
let activeSort = 'views';
let showN = 10;
let refreshing = false;

function fmtN(n){if(!n)return'0';if(n>=10000)return(n/10000).toFixed(1)+'万';if(n>=1000)return(n/1000).toFixed(1)+'k';return''+n;}
function timeAgo(iso){const d=(Date.now()-new Date(iso))/1000;if(d<60)return'今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';if(d<86400*30)return Math.floor(d/86400)+'日前';return Math.floor(d/86400/30)+'ヶ月前';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function fetchYouTube(){
  document.getElementById('loadingBar').classList.add('show');
  document.getElementById('errorBar').classList.remove('show');
  try{
    const searchUrl=`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(KEYWORDS)}&type=video&order=date&maxResults=${MAX_RESULTS}&regionCode=JP&relevanceLanguage=ja&key=${API_KEY}`;
    const searchRes=await fetch(searchUrl);
    const searchData=await searchRes.json();
    if(searchData.error) throw new Error(searchData.error.message);
    const items=searchData.items||[];
    if(items.length===0) throw new Error('動画が見つかりませんでした');
    const ids=items.map(i=>i.id.videoId).join(',');
    const statsUrl=`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${ids}&key=${API_KEY}`;
    const statsRes=await fetch(statsUrl);
    const statsData=await statsRes.json();
    const statsMap={};
    (statsData.items||[]).forEach(v=>{statsMap[v.id]=v.statistics;});
    POSTS=items.map(item=>{
      const vid=item.id.videoId;
      const snip=item.snippet;
      const stats=statsMap[vid]||{};
      const views=parseInt(stats.viewCount||0);
      const likes=parseInt(stats.likeCount||0);
      const comments=parseInt(stats.commentCount||0);
      return{id:vid,title:snip.title,channel:snip.channelTitle,text:snip.description?.slice(0,200)||snip.title,time:snip.publishedAt,thumb:snip.thumbnails?.medium?.url||'',views,likes,comments,url:`https://www.youtube.com/watch?v=${vid}`,tags:autoTag(snip.title)};
    });
    renderFeed();
    renderSidebar();
    document.getElementById('updateTime').textContent=new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})+' 更新';
  }catch(e){
    const eb=document.getElementById('errorBar');
    eb.textContent='⚠️ YouTube取得エラー: '+e.message;
    eb.classList.add('show');
  }finally{
    document.getElementById('loadingBar').classList.remove('show');
  }
}

function autoTag(title){
  const tags=[];
  if(/新商品|新発売|新作/.test(title)) tags.push({l:'新商品',c:'ptag-new'});
  if(/コラボ|限定|期間限定/.test(title)) tags.push({l:'コラボ',c:'ptag-collab'});
  if(/スイーツ|プリン|ケーキ|パフェ|アイス|チョコ|苺|大福/.test(title)) tags.push({l:'スイーツ',c:'ptag-food'});
  if(/弁当|おにぎり|サンド|麺|飯|肉まん|から揚げ/.test(title)) tags.push({l:'フード',c:'ptag-food'});
  tags.push({l:'YouTube',c:'ptag-yt'});
  return tags;
}

function getFiltered(){
  const kw=document.getElementById('searchInput').value.toLowerCase();
  let posts=[...POSTS];
  if(kw) posts=posts.filter(p=>p.title.toLowerCase().includes(kw)||p.channel.toLowerCase().includes(kw));
  if(activeSort==='views') posts.sort((a,b)=>b.views-a.views);
  else if(activeSort==='likes') posts.sort((a,b)=>b.likes-a.likes);
  else posts.sort((a,b)=>new Date(b.time)-new Date(a.time));
  return posts;
}

function renderFeed(){
  const posts=getFiltered();
  document.getElementById('feedCount').textContent=`(${posts.length}件)`;
  const el=document.getElementById('feedList');
  if(!posts.length){el.innerHTML='<div class="empty"><span class="big">📡</span>データを取得中、または該当動画がありません</div>';document.getElementById('loadMoreWrap').style.display='none';return;}
  el.innerHTML=posts.slice(0,showN).map((p,i)=>{
    const tags=p.tags.map(t=>`<span class="ptag ${t.c}">${t.l}</span>`).join('');
    const hot=p.views>=100000?'<span class="hot-badge">🔥 HOT</span>':'';
    const thumb=p.thumb?`<img class="pcard-thumb" src="${esc(p.thumb)}" alt="" loading="lazy">`:`<div class="platform-icon pi-youtube">YT</div>`;
    return`<div class="pcard" style="animation-delay:${i*.03}s" onclick="openModal('${esc(p.id)}')">
      <div class="pcard-top">${thumb}<div class="pcard-info">
        <div class="pcard-meta"><span class="pcard-author">${esc(p.channel)}${hot}</span><span class="pcard-time">${timeAgo(p.time)}</span></div>
        ${tags?`<div class="pcard-tags">${tags}</div>`:''}
        <div class="pcard-text">${esc(p.title)}</div>
      </div></div>
      <div class="pcard-metrics">
        <div class="metric">👁 <strong>${fmtN(p.views)}</strong></div>
        <div class="metric">👍 <strong>${fmtN(p.likes)}</strong></div>
        <div class="metric">💬 <strong>${fmtN(p.comments)}</strong></div>
        <div class="pcard-buzz"><div class="buzz-num">${fmtN(p.views)}</div><div class="buzz-label">再生数</div></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreWrap').style.display=posts.length>showN?'block':'none';
}

function loadMore(){showN+=10;renderFeed();}

function renderSidebar(){
  const posts=POSTS;
  if(!posts.length)return;
  const topViews=[...posts].sort((a,b)=>b.views-a.views)[0];
  const topLikes=[...posts].sort((a,b)=>b.likes-a.likes)[0];
  document.getElementById('st-total').textContent=posts.length;
  document.getElementById('st-sub').textContent='リアルタイム取得';
  document.getElementById('st-views').textContent=fmtN(topViews.views);
  document.getElementById('st-views-sub').textContent=topViews.title.slice(0,12)+'…';
  document.getElementById('st-likes').textContent=fmtN(topLikes.likes);
  document.getElementById('st-likes-sub').textContent=topLikes.title.slice(0,12)+'…';
  const wmap={};
  const stop=new Set(['の','は','が','を','に','で','と','も','や','から','する','した','して','いる','ある','こと','その','この','な','ない','れ','て','セブン','セブンイレブン','コンビニ','ます','です','してみた','食べてみた']);
  posts.forEach(p=>{(p.title.match(/[ぁ-ん]{2,}|[ァ-ン]{3,}|[一-龠]{2,}/g)||[]).forEach(w=>{if(!stop.has(w)&&w.length>1)wmap[w]=(wmap[w]||0)+1;});});
  const kws=Object.entries(wmap).sort((a,b)=>b[1]-a[1]).slice(0,7);
  document.getElementById('st-word').textContent=kws[0]?.[0]||'—';
  document.getElementById('st-word-sub').textContent=kws[0]?`${kws[0][1]}本の動画`:'トレンド';
  const topVideos=[...posts].sort((a,b)=>b.views-a.views).slice(0,5);
  document.getElementById('prodList').innerHTML=topVideos.map((v,i)=>`<div class="prod-item" onclick="openModal('${v.id}')"><div class="prod-rank ${i<3?'top':''}">${i+1}</div><div><div class="prod-name">${esc(v.title.slice(0,28))}…</div><div class="prod-views">👁 <strong>${fmtN(v.views)}</strong> 再生</div></div></div>`).join('');
  const maxK=kws[0]?.[1]||1;
  document.getElementById('trendList').innerHTML=kws.map(([w,c],i)=>`<div class="trend-item" onclick="document.getElementById('searchInput').value='${w}';renderFeed()"><div class="ti-rank ${i<3?'top3':''}">${i+1}</div><div class="ti-body"><div class="ti-word">${esc(w)}</div><div class="ti-cnt">${c}本</div></div><div class="ti-bar"><div class="ti-fill" style="width:${c/maxK*100}%"></div></div></div>`).join('');
  document.getElementById('pbList').innerHTML=`<div class="pb-item"><div class="pb-name" style="color:#ff0000">YouTube</div><div class="pb-bar"><div class="pb-fill" style="width:100%;background:#ff0000"></div></div><div class="pb-cnt">${posts.length}</div></div><div style="margin-top:10px;font-size:11px;color:var(--sub);line-height:1.7">🔑 YouTube Data API v3<br>🔄 5分ごとに自動更新<br>🇯🇵 日本語動画のみ取得</div>`;
}

function openModal(id){
  const p=POSTS.find(x=>x.id===id);if(!p)return;
  const tags=p.tags.map(t=>`<span class="ptag ${t.c}">${t.l}</span>`).join('');
  document.getElementById('modalBody').innerHTML=`
    ${p.thumb?`<img src="${esc(p.thumb)}" style="width:100%;border-radius:8px;margin-bottom:14px">`:''}
    <div style="font-weight:700;font-size:15px;margin-bottom:6px;line-height:1.5">${esc(p.title)}</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:12px">${esc(p.channel)} · ${timeAgo(p.time)}</div>
    ${tags?`<div class="pcard-tags" style="margin-bottom:12px">${tags}</div>`:''}
    <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px">
      <div class="metric" style="font-size:13px">👁 <strong style="font-size:16px;color:#cc0000">${fmtN(p.views)}</strong> 再生</div>
      <div class="metric" style="font-size:13px">👍 <strong>${fmtN(p.likes)}</strong> いいね</div>
      <div class="metric" style="font-size:13px">💬 <strong>${fmtN(p.comments)}</strong> コメント</div>
    </div>
    <a class="yt-link" href="${esc(p.url)}" target="_blank">▶ YouTubeで見る</a>`;
  document.getElementById('modalOverlay').classList.add('on');
}

function closeModal(e){if(!e||e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.remove('on');}
function setSort(s,btn){activeSort=s;document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderFeed();}

function doRefresh(){
  if(refreshing)return;refreshing=true;showN=10;
  const btn=document.querySelector('.refresh-btn');
  btn.classList.add('spin');btn.disabled=true;
  fetchYouTube().finally(()=>{btn.classList.remove('spin');btn.disabled=false;refreshing=false;});
}

document.addEventListener('DOMContentLoaded',()=>{
  fetchYouTube();
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  setInterval(doRefresh,5*60*1000);
});
</script>
</body>
</html>
