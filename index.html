<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンビニバズレーダー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Zen+Kaku+Gothic+New:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#0c0c14;--ink2:#13131f;--ink3:#1c1c2e;--line:#252538;
  --neon-pink:#ff2d6b;--neon-cyan:#00e5ff;--neon-yellow:#ffe600;--neon-green:#00ff9d;
  --tw:#1d9bf0;--ig:#f7184e;--tt:#69c9d0;--yt:#ff3c3c;
  --text:#e8e8f4;--muted:#5a5a7a;--card:rgba(28,28,46,0.85);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--ink);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;overflow-x:hidden;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);pointer-events:none;z-index:9999;}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;mix-blend-mode:screen;}
.orb-1{width:700px;height:700px;background:radial-gradient(circle,rgba(255,45,107,0.18) 0%,transparent 70%);top:-300px;right:-200px;}
.orb-2{width:600px;height:600px;background:radial-gradient(circle,rgba(0,229,255,0.12) 0%,transparent 70%);bottom:-200px;left:-150px;}
.orb-3{width:400px;height:400px;background:radial-gradient(circle,rgba(255,230,0,0.07) 0%,transparent 70%);top:40%;left:40%;}

/* HEADER */
header{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:rgba(12,12,20,0.9);backdrop-filter:blur(24px);border-bottom:1px solid var(–line);}
.logo{display:flex;align-items:baseline;gap:8px;}
.logo-main{font-family:‘Bebas Neue’,sans-serif;font-size:26px;letter-spacing:3px;color:var(–neon-yellow);text-shadow:0 0 20px rgba(255,230,0,0.6),0 0 40px rgba(255,230,0,0.3);line-height:1;}
.logo-sub{font-size:11px;font-weight:300;color:var(–muted);letter-spacing:2px;text-transform:uppercase;padding-bottom:2px;}
.header-center{display:flex;align-items:center;gap:6px;}
.platform-pill{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.5px;border:1px solid;cursor:pointer;transition:all .2s;background:transparent;font-family:inherit;}
.platform-pill:hover{filter:brightness(1.3);}
.pill-tw{color:var(–tw);border-color:rgba(29,155,240,.35);}
.pill-tw.ap{background:rgba(29,155,240,.15);}
.pill-ig{color:var(–ig);border-color:rgba(247,24,78,.35);}
.pill-ig.ap{background:rgba(247,24,78,.15);}
.pill-tt{color:var(–tt);border-color:rgba(105,201,208,.35);}
.pill-tt.ap{background:rgba(105,201,208,.15);}
.pill-yt{color:var(–yt);border-color:rgba(255,60,60,.35);}
.pill-yt.ap{background:rgba(255,60,60,.15);}
.header-right{display:flex;align-items:center;gap:12px;}
.live-indicator{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:2px;color:var(–neon-pink);}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(–neon-pink);box-shadow:0 0 8px var(–neon-pink);animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 8px var(–neon-pink);}50%{opacity:.3;box-shadow:none;}}
.update-time{font-size:11px;color:var(–muted);}
.refresh-btn{padding:6px 14px;border-radius:4px;font-size:12px;font-weight:700;font-family:inherit;letter-spacing:1px;background:transparent;border:1px solid var(–neon-cyan);color:var(–neon-cyan);cursor:pointer;transition:all .2s;text-transform:uppercase;}
.refresh-btn:hover{background:rgba(0,229,255,.1);box-shadow:0 0 16px rgba(0,229,255,.25);}
.refresh-btn.spinning .ri{display:inline-block;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* MAIN */
main{position:relative;z-index:1;max-width:1560px;margin:0 auto;padding:20px 24px 40px;}

/* STATS */
.stats-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px;}
.stat-tile{background:var(–card);border:1px solid var(–line);border-radius:8px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s;}
.stat-tile::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:var(–ac,var(–neon-yellow));box-shadow:0 0 12px var(–ac,var(–neon-yellow));}
.stat-tile:hover{border-color:var(–ac,var(–neon-yellow));}
.stat-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);margin-bottom:8px;}
.stat-val{font-family:‘Bebas Neue’,sans-serif;font-size:32px;line-height:1;color:var(–ac,var(–neon-yellow));text-shadow:0 0 20px var(–ac,var(–neon-yellow));letter-spacing:1px;}
.stat-sub{font-size:11px;color:var(–muted);margin-top:4px;}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 300px;gap:16px;}

/* FEED */
.feed-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.feed-title{font-family:‘Bebas Neue’,sans-serif;font-size:20px;letter-spacing:3px;color:var(–neon-cyan);text-shadow:0 0 16px rgba(0,229,255,.4);}
.feed-count{font-size:12px;color:var(–muted);margin-left:8px;}
.sort-btns{display:flex;gap:4px;}
.sort-btn{padding:4px 10px;border-radius:3px;font-size:11px;font-weight:700;font-family:inherit;letter-spacing:.5px;cursor:pointer;border:1px solid var(–line);background:transparent;color:var(–muted);transition:all .15s;text-transform:uppercase;}
.sort-btn.on{background:var(–neon-pink);border-color:var(–neon-pink);color:#000;box-shadow:0 0 12px rgba(255,45,107,.4);}
.search-bar{position:relative;margin-bottom:12px;}
.search-bar input{width:100%;background:var(–ink3);border:1px solid var(–line);border-radius:6px;padding:10px 16px 10px 38px;color:var(–text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.search-bar input::placeholder{color:var(–muted);}
.search-bar input:focus{border-color:var(–neon-cyan);}
.search-bar .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(–muted);font-size:15px;}
#feedContainer{display:flex;flex-direction:column;gap:8px;}

/* POST CARD */
.post-card{background:var(–card);border:1px solid var(–line);border-radius:8px;padding:14px 16px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:start;cursor:pointer;transition:all .18s;opacity:0;animation:slideUp .35s ease forwards;position:relative;overflow:hidden;}
.post-card:hover{border-color:var(–pc,var(–neon-pink));transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 1px var(–pc,var(–neon-pink));}
@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.p-avatar{width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;border:1px solid;}
.p-body{min-width:0;}
.p-toprow{display:flex;align-items:center;gap:6px;margin-bottom:5px;flex-wrap:wrap;}
.p-author{font-size:13px;font-weight:700;white-space:nowrap;}
.p-handle{font-size:11px;color:var(–muted);}
.p-time{font-size:10px;color:var(–muted);margin-left:auto;}
.p-tags{display:flex;gap:4px;margin-bottom:6px;flex-wrap:wrap;}
.p-tag{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.tag-new{background:rgba(255,45,107,.15);color:var(–neon-pink);border:1px solid rgba(255,45,107,.3);}
.tag-chara{background:rgba(255,230,0,.12);color:var(–neon-yellow);border:1px solid rgba(255,230,0,.3);}
.tag-collab{background:rgba(0,229,255,.1);color:var(–neon-cyan);border:1px solid rgba(0,229,255,.25);}
.tag-food{background:rgba(0,255,157,.1);color:var(–neon-green);border:1px solid rgba(0,255,157,.25);}
.p-text{font-size:13px;line-height:1.7;color:#c0c0d8;word-break:break-all;}
.p-metrics{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap;}
.p-metric{font-size:11px;color:var(–muted);display:flex;align-items:center;gap:3px;}
.p-metric strong{color:var(–text);font-size:12px;}
.p-buzz-col{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.buzz-badge{display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:4px;font-family:‘Bebas Neue’,sans-serif;font-size:17px;letter-spacing:.5px;white-space:nowrap;}

/* EMPTY */
.empty-msg{text-align:center;padding:48px;color:var(–muted);font-size:14px;line-height:2;border:1px dashed var(–line);border-radius:8px;}
.empty-msg .big{font-size:40px;display:block;margin-bottom:12px;}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin-top:12px;}
.load-more-btn{padding:8px 28px;border-radius:4px;font-size:12px;font-weight:700;font-family:inherit;letter-spacing:1px;background:transparent;border:1px solid var(–line);color:var(–muted);cursor:pointer;text-transform:uppercase;transition:all .2s;}
.load-more-btn:hover{border-color:var(–neon-cyan);color:var(–neon-cyan);}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:12px;}
.s-card{background:var(–card);border:1px solid var(–line);border-radius:8px;padding:14px 16px;}
.s-card-title{font-family:‘Bebas Neue’,sans-serif;font-size:15px;letter-spacing:2.5px;color:var(–neon-yellow);text-shadow:0 0 12px rgba(255,230,0,.35);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(–line);}
.trend-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(–line);cursor:pointer;transition:all .15s;}
.trend-row:last-child{border-bottom:none;}
.trend-row:hover .tr-word{color:var(–neon-cyan);}
.tr-rank{font-family:‘Bebas Neue’,sans-serif;font-size:20px;width:24px;text-align:center;color:var(–line);}
.tr-rank.hot{color:var(–neon-pink);text-shadow:0 0 10px var(–neon-pink);}
.tr-info{flex:1;min-width:0;}
.tr-word{font-size:12px;font-weight:700;transition:color .15s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tr-cnt{font-size:10px;color:var(–muted);margin-top:1px;}
.tr-bar{width:50px;height:3px;background:var(–line);border-radius:2px;overflow:hidden;}
.tr-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(–neon-pink),var(–neon-yellow));}
.pb-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(–line);}
.pb-row:last-child{border-bottom:none;}
.pb-name{font-size:12px;font-weight:700;width:70px;}
.pb-bar{flex:1;height:4px;background:var(–line);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.pb-cnt{font-size:11px;color:var(–muted);width:28px;text-align:right;}
.alert-row{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(–line);}
.alert-row:last-child{border-bottom:none;}
.a-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.a-dot.h{background:var(–neon-pink);box-shadow:0 0 6px var(–neon-pink);}
.a-dot.m{background:var(–neon-yellow);box-shadow:0 0 6px var(–neon-yellow);}
.a-dot.l{background:var(–neon-green);box-shadow:0 0 6px var(–neon-green);}
.a-text{font-size:11px;line-height:1.6;color:#b0b0cc;}
.a-meta{font-size:10px;color:var(–muted);margin-top:2px;}
.cat-chips{display:flex;flex-wrap:wrap;gap:6px;}
.cat-chip{padding:4px 10px;border-radius:3px;font-size:11px;font-weight:700;background:var(–ink3);border:1px solid var(–line);display:flex;align-items:center;gap:4px;cursor:pointer;transition:all .15s;}
.cat-chip:hover{border-color:var(–neon-cyan);color:var(–neon-cyan);}
.cat-chip.sel{border-color:var(–neon-pink);color:var(–neon-pink);background:rgba(255,45,107,.1);}
.cat-num{font-family:‘Bebas Neue’,sans-serif;font-size:14px;color:var(–neon-cyan);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-bg.on{display:flex;}
.modal-box{background:var(–ink2);border:1px solid var(–line);border-radius:12px;padding:28px;max-width:540px;width:92%;max-height:85vh;overflow-y:auto;position:relative;animation:popIn .2s ease;}
@keyframes popIn{from{opacity:0;transform:scale(.95);}to{opacity:1;transform:scale(1);}}
.modal-close{position:absolute;top:14px;right:14px;background:var(–ink3);border:1px solid var(–line);border-radius:4px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(–muted);font-size:14px;transition:all .15s;}
.modal-close:hover{color:var(–text);border-color:var(–muted);}

/* RESPONSIVE */
@media(max-width:1100px){.layout{grid-template-columns:1fr;}.sidebar{display:grid;grid-template-columns:repeat(2,1fr);}}
@media(max-width:700px){.stats-strip{grid-template-columns:repeat(3,1fr);}header{padding:0 14px;}.header-center{display:none;}main{padding:14px 12px 32px;}.sidebar{grid-template-columns:1fr;}.post-card{grid-template-columns:auto 1fr;}.p-buzz-col{display:none;}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(–ink);}
::-webkit-scrollbar-thumb{background:var(–line);border-radius:2px;}
</style>

</head>

let activePlats=new Set(['twitter','instagram','tiktok','youtube']);
let activeSort='buzz';
let activeCat=null;
let showN=15;
let refreshing=false;

const PC={
  twitter: {label:'𝕏', color:'var(--tw)', bg:'rgba(29,155,240,.15)',  bd:'rgba(29,155,240,.35)', name:'𝕏 Twitter'},
  instagram:{label:'IG',color:'var(--ig)', bg:'rgba(247,24,78,.13)',   bd:'rgba(247,24,78,.35)',   name:'Instagram'},
  tiktok:  {label:'TT',color:'var(--tt)', bg:'rgba(105,201,208,.13)', bd:'rgba(105,201,208,.3)',  name:'TikTok'},
  youtube: {label:'▶', color:'var(--yt)', bg:'rgba(255,60,60,.13)',   bd:'rgba(255,60,60,.3)',    name:'YouTube'},
};

function togglePlatform(btn){
  const p=btn.dataset.plat;
  if(activePlats.has(p)){if(activePlats.size===1)return;activePlats.delete(p);btn.classList.remove('ap');}
  else{activePlats.add(p);btn.classList.add('ap');}
  renderAll();
}

function setSort(s,btn){
  activeSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderFeed();
}

function getFiltered(){
  const kw=document.getElementById('searchInput').value.toLowerCase();
  let posts=MOCK.filter(p=>activePlats.has(p.plat));
  if(kw) posts=posts.filter(p=>p.text.toLowerCase().includes(kw)||p.name.toLowerCase().includes(kw));
  if(activeCat) posts=posts.filter(p=>p.tags.some(t=>t.l===activeCat));
  if(activeSort==='buzz') posts.sort((a,b)=>b.buzz-a.buzz);
  else posts.sort((a,b)=>new Date(b.time)-new Date(a.time));
  return posts;
}

function fmtN(n){if(!n)return'0';if(n>=10000)return(n/10000).toFixed(1)+'万';if(n>=1000)return(n/1000).toFixed(1)+'k';return''+n;}
function timeAgo(iso){const d=(Date.now()-new Date(iso))/1000;if(d<60)return'今';if(d<3600)return Math.floor(d/60)+'分前';if(d<86400)return Math.floor(d/3600)+'時間前';return Math.floor(d/86400)+'日前';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderFeed(){
  const posts=getFiltered();
  document.getElementById('feedCount').textContent=`(${posts.length}件)`;
  const c=document.getElementById('feedContainer');
  if(!posts.length){
    c.innerHTML='<div class="empty-msg"><span class="big">📡</span>条件に一致する投稿がありません。<br>フィルターを変更してみてください。</div>';
    document.getElementById('loadMoreWrap').style.display='none';return;
  }
  c.innerHTML=posts.slice(0,showN).map((p,i)=>{
    const cfg=PC[p.plat];
    const tags=p.tags.map(t=>`<span class="p-tag ${t.c}">${t.l}</span>`).join('');
    const views=p.views?`<span class="p-metric">👁 <strong>${fmtN(p.views)}</strong></span>`:'';
    const shr=p.shares?`<span class="p-metric">🔁 <strong>${fmtN(p.shares)}</strong></span>`:'';
    return`<div class="post-card" style="--pc:${cfg.color};animation-delay:${i*.04}s" onclick="openModal(${p.id})">
      <div class="p-avatar" style="background:${cfg.bg};color:${cfg.color};border-color:${cfg.bd}">${cfg.label}</div>
      <div class="p-body">
        <div class="p-toprow"><span class="p-author">${esc(p.name)}</span><span class="p-handle">${esc(p.author)}</span><span class="p-time">${timeAgo(p.time)}</span></div>
        ${tags?`<div class="p-tags">${tags}</div>`:''}
        <div class="p-text">${esc(p.text.slice(0,160))}${p.text.length>160?'…':''}</div>
        <div class="p-metrics"><span class="p-metric">❤️ <strong>${fmtN(p.likes)}</strong></span>${shr}<span class="p-metric">💬 <strong>${fmtN(p.comments)}</strong></span>${views}</div>
      </div>
      <div class="p-buzz-col"><div class="buzz-badge" style="background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.bd}">⚡ ${fmtN(p.buzz)}</div></div>
    </div>`;
  }).join('');
  document.getElementById('loadMoreWrap').style.display=posts.length>showN?'block':'none';
}

function loadMore(){showN+=15;renderFeed();}

function renderStats(){
  const all=MOCK.filter(p=>activePlats.has(p.plat));
  const ct={twitter:0,instagram:0,tiktok:0,youtube:0};
  all.forEach(p=>ct[p.plat]++);
  document.getElementById('s-total').textContent=all.length;
  document.getElementById('s-tsub').textContent='バズ合計: '+fmtN(all.reduce((a,b)=>a+b.buzz,0));
  document.getElementById('s-tw').textContent=ct.twitter;
  document.getElementById('s-ig').textContent=ct.instagram;
  document.getElementById('s-tt').textContent=ct.tiktok;

  const wmap={};
  const stop=new Set(['の','は','が','を','に','で','と','も','や','から','して','した','する','です','ます','いる','ある','こと','その','この','RT','な']);
  all.forEach(p=>{
    (p.text.match(/[ぁ-ん]{2,}|[ァ-ン]{3,}|[一-龠]{2,}|[A-Za-z]{4,}|#[^\s！？。、]+/g)||[])
    .forEach(w=>{if(!stop.has(w)&&w.length>1)wmap[w]=(wmap[w]||0)+1;});
  });
  const kws=Object.entries(wmap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxK=kws[0]?.[1]||1;
  document.getElementById('s-top').textContent=kws[0]?.[0]||'--';
  document.getElementById('s-tsub2').textContent=kws[0]?kws[0][1]+'件':'急上昇';

  document.getElementById('trendList').innerHTML=kws.map(([w,c],i)=>`
    <div class="trend-row" onclick="filterByKw('${w.replace(/'/g,"\\'")}')">
      <div class="tr-rank ${i<3?'hot':''}">${i+1}</div>
      <div class="tr-info"><div class="tr-word">${esc(w)}</div><div class="tr-cnt">${c}件の投稿</div></div>
      <div class="tr-bar"><div class="tr-fill" style="width:${c/maxK*100}%"></div></div>
    </div>`).join('')||'<div style="color:var(--muted);font-size:12px;text-align:center;padding:12px 0">データなし</div>';

  const maxP=Math.max(...Object.values(ct),1);
  document.getElementById('pbList').innerHTML=Object.entries(ct).map(([k,v])=>`
    <div class="pb-row">
      <div class="pb-name" style="color:${PC[k].color}">${PC[k].name}</div>
      <div class="pb-bar"><div class="pb-fill" style="width:${v/maxP*100}%;background:${PC[k].color}"></div></div>
      <div class="pb-cnt">${v}</div>
    </div>`).join('');

  const hot=[...all].sort((a,b)=>b.buzz-a.buzz).slice(0,4);
  document.getElementById('alertList').innerHTML=hot.map(p=>{
    const lv=p.buzz>100000?'h':p.buzz>50000?'m':'l';
    return`<div class="alert-row"><div class="a-dot ${lv}"></div><div><div class="a-text">${esc(p.text.slice(0,55))}…</div><div class="a-meta">⚡ ${fmtN(p.buzz)} · ${timeAgo(p.time)} · ${PC[p.plat].name}</div></div></div>`;
  }).join('');

  const catMap={};
  all.forEach(p=>p.tags.forEach(t=>catMap[t.l]=(catMap[t.l]||0)+1));
  document.getElementById('catChips').innerHTML=Object.entries(catMap).sort((a,b)=>b[1]-a[1])
    .map(([k,v])=>`<div class="cat-chip ${activeCat===k?'sel':''}" onclick="filterByCat('${k.replace(/'/g,"\\'")}')"><span>${k}</span><span class="cat-num">${v}</span></div>`).join('');
}

function filterByKw(w){document.getElementById('searchInput').value=w;renderFeed();}
function filterByCat(cat){activeCat=activeCat===cat?null:cat;renderAll();}

function openModal(id){
  const p=MOCK.find(x=>x.id===id);if(!p)return;
  const cfg=PC[p.plat];
  const tags=p.tags.map(t=>`<span class="p-tag ${t.c}">${t.l}</span>`).join('');
  const views=p.views?`<div class="p-metric" style="font-size:13px">👁 <strong style="font-size:14px">${fmtN(p.views)}</strong> 再生</div>`:'';
  document.getElementById('modalBody').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div style="width:44px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.bd};flex-shrink:0">${cfg.label}</div>
      <div><div style="font-weight:700;font-size:15px">${esc(p.name)}</div><div style="font-size:12px;color:var(--muted)">${esc(p.author)} · ${cfg.name} · ${timeAgo(p.time)}</div></div>
      <div class="buzz-badge" style="margin-left:auto;background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.bd}">⚡ ${fmtN(p.buzz)}</div>
    </div>
    ${tags?`<div class="p-tags" style="margin-bottom:12px">${tags}</div>`:''}
    <div style="font-size:14px;line-height:1.85;color:#c8c8e4;background:var(--ink3);border-radius:8px;padding:16px;margin-bottom:16px;border:1px solid var(--line)">${esc(p.text)}</div>
    <div style="display:flex;gap:16px;flex-wrap:wrap">
      <div class="p-metric" style="font-size:13px">❤️ <strong style="font-size:14px">${fmtN(p.likes)}</strong> いいね</div>
      ${p.shares?`<div class="p-metric" style="font-size:13px">🔁 <strong style="font-size:14px">${fmtN(p.shares)}</strong> シェア</div>`:''}
      <div class="p-metric" style="font-size:13px">💬 <strong style="font-size:14px">${fmtN(p.comments)}</strong> コメント</div>${views}
    </div>`;
  document.getElementById('modalBg').classList.add('on');
}

function closeModal(e){if(!e||e.target===document.getElementById('modalBg'))document.getElementById('modalBg').classList.remove('on');}

function doRefresh(){
  if(refreshing)return;refreshing=true;
  const btn=document.querySelector('.refresh-btn');
  btn.classList.add('spinning');btn.disabled=true;
  setTimeout(()=>{
    showN=15;renderAll();refreshing=false;
    btn.classList.remove('spinning');btn.disabled=false;
    document.getElementById('updateTime').textContent='更新: '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  },800);
}

function renderAll(){renderFeed();renderStats();}

document.addEventListener('DOMContentLoaded',()=>{
  renderAll();
  document.getElementById('updateTime').textContent='更新: '+new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
  setInterval(doRefresh,5*60*1000);
});
</script>
